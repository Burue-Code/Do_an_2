spring:
  datasource:
    url: jdbc:mysql://localhost:3306/movie_recommendation?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false
    locations: classpath:db/migration

app:
  jwt:
    # HS256 cần secret đủ dài (>= 32 bytes) để JJWT chấp nhận.
    secret: "change-this-dev-secret-key-please-override-32bytes"
    expiration-ms: 86400000


