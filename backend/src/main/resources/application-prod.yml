# Prod profile - override bằng env (docker-compose)
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/movie_recommendation}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  jwt:
    # HS256 cần secret đủ dài (>= 32 bytes) để JJWT chấp nhận.
    secret: ${APP_JWT_SECRET:change-this-prod-secret-please-override-32bytes}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
