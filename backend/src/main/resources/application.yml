spring:
  application:
    name: movie-recommendation-system
  profiles:
    active: dev

  # Fallback datasource config (có thể override bằng env/VM args).
  # Tránh lỗi "Unable to determine Dialect without JDBC metadata" khi profile không được load đúng.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/movie_recommendation?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    root: INFO
    com.example.movierecommendation: DEBUG

