openapi: 3.0.3
info:
  title: Movie Recommendation System API
  version: 1.0.0
  description: >
    API cho hệ thống gợi ý phim theo thể loại, được thiết kế theo tài liệu
    SRS, ERD và tech stack của đồ án.
servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
  - name: Users
  - name: Genres
  - name: Movies
  - name: Episodes
  - name: Schedules
  - name: Comments
  - name: Ratings
  - name: Likes
  - name: Watchlist
  - name: WatchHistory
  - name: Search
  - name: Recommendation
  - name: Admin

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Đăng ký tài khoản mới
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseWrapper'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseWrapper'
        '401':
          description: Sai thông tin đăng nhập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Lấy thông tin tài khoản hiện tại
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Thông tin người dùng hiện tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponseWrapper'
        '401':
          description: Chưa đăng nhập hoặc token không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/movies:
    get:
      tags: [Movies]
      summary: Danh sách phim (có phân trang & filter cơ bản)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
          description: Trang (bắt đầu từ 0)
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Số phần tử mỗi trang
        - in: query
          name: genreId
          schema:
            type: integer
          description: Lọc theo genre
        - in: query
          name: keyword
          schema:
            type: string
          description: Tìm theo từ khóa tiêu đề
      responses:
        '200':
          description: Danh sách phim
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieListResponseWrapper'

  /api/movies/{id}:
    get:
      tags: [Movies]
      summary: Xem chi tiết phim theo ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Chi tiết phim
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieDetailResponseWrapper'
        '404':
          description: Không tìm thấy phim
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/movies/{movieId}/comments:
    get:
      tags: [Comments]
      summary: Danh sách bình luận cho một phim
      parameters:
        - in: path
          name: movieId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách bình luận
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponseWrapper'
    post:
      tags: [Comments]
      summary: Thêm bình luận cho phim
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: movieId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Tạo bình luận thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponseWrapper'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/movies/{movieId}/ratings:
    post:
      tags: [Ratings]
      summary: Tạo hoặc cập nhật đánh giá cho phim
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: movieId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RateMovieRequest'
      responses:
        '200':
          description: Đánh giá thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingSummaryResponseWrapper'
        '401':
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/movies/{movieId}/like/toggle:
    post:
      tags: [Likes]
      summary: Thích / bỏ thích phim
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: movieId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Trả về trạng thái like hiện tại sau khi toggle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToggleLikeResponseWrapper'
        '401':
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/movies/{movieId}/watchlist/toggle:
    post:
      tags: [Watchlist]
      summary: Lưu / bỏ lưu phim vào danh sách theo dõi
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: movieId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Trả về trạng thái watchlist hiện tại sau khi toggle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistToggleResponseWrapper'
        '401':
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/me/watchlist:
    get:
      tags: [Watchlist]
      summary: Danh sách phim theo dõi của người dùng hiện tại
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách phim watchlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieListResponseWrapper'
        '401':
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recommendations/me:
    get:
      tags: [Recommendation]
      summary: Gợi ý phim cho người dùng hiện tại
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách phim được gợi ý
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationResponseWrapper'
        '401':
          description: Chưa đăng nhập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
          nullable: true
        errors:
          type: object
          nullable: true

    PageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            type: object
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            errors:
              type: object

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    RegisterRequest:
      type: object
      required: [username, password, fullName]
      properties:
        username:
          type: string
        password:
          type: string
        fullName:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/UserProfile'

    AuthResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthResponse'

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string

    UserProfileResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserProfile'

    MovieCard:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        poster:
          type: string
          nullable: true
        ratingScore:
          type: number
          format: float
        ratingCount:
          type: integer
        movieType:
          type: integer

    MovieListResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              allOf:
                - $ref: '#/components/schemas/PageResponse'
                - type: object
                  properties:
                    content:
                      type: array
                      items:
                        $ref: '#/components/schemas/MovieCard'

    MovieDetail:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        releaseYear:
          type: integer
          nullable: true
        poster:
          type: string
          nullable: true
        duration:
          type: integer
          nullable: true
        status:
          type: string
          nullable: true
        totalEpisodes:
          type: integer
          nullable: true
        ratingScore:
          type: number
          format: float
        ratingCount:
          type: integer
        genres:
          type: array
          items:
            type: string

    MovieDetailResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MovieDetail'

    Comment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        username:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    CommentListResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Comment'

    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string

    CommentResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Comment'

    RateMovieRequest:
      type: object
      required: [ratingValue]
      properties:
        ratingValue:
          type: integer
          minimum: 1
          maximum: 5

    RatingSummary:
      type: object
      properties:
        ratingScore:
          type: number
          format: float
        ratingCount:
          type: integer

    RatingSummaryResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RatingSummary'

    ToggleLikeResponse:
      type: object
      properties:
        liked:
          type: boolean

    ToggleLikeResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ToggleLikeResponse'

    WatchlistToggleResponse:
      type: object
      properties:
        inWatchlist:
          type: boolean

    WatchlistToggleResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/WatchlistToggleResponse'

    RecommendationItem:
      type: object
      properties:
        movie:
          $ref: '#/components/schemas/MovieCard'
        score:
          type: number
          format: float

    RecommendationResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationItem'

    RecommendationResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RecommendationResponse'

